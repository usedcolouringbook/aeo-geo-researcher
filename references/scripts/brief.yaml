client:
  type: "Small business owner — independent editorial directory (slocoffeeguide.com)"
  goal: "Understand why slocoffeeguide.com isn't getting AI citation traction despite perceived AEO/GEO compatibility"
  date: "2026-05-30"

session:
  angle: "Technical and platform diagnosis of AEO/GEO underperformance — schema, crawl signals, Bing indexation, and per-platform citation presence"
  specialists_engaged:
    - "Orchestrator"
    - "Signal & Technical"
    - "Platform Intelligence"

findings:
  - domain: "Crawl & Indexation"
    summary: "AI bot access is correctly configured. Critical gap: zero Bing indexation, blocking ChatGPT and Copilot entirely."
    items:
      - signal: "Bing indexation — 0 results (site:slocoffeeguide.com)"
        detail: "ChatGPT and Copilot are Bing-dependent. Zero Bing indexation = complete block on both platforms regardless of content quality or schema. Fix: submit to Bing Webmaster Tools."
        status: "confirmed"
        priority: "critical"
      - signal: "AI bot permissions — all major crawlers permitted"
        detail: "GPTBot, OAI-SearchBot, ClaudeBot, PerplexityBot, Google-Extended, Bingbot, Googlebot all explicitly allowed in robots.txt. llms.txt and llms-full.txt granted access."
        status: "confirmed"
        priority: "low"
      - signal: "llms.txt and llms-full.txt — present and populated"
        detail: "Both agent-native endpoints exist and are correctly structured. llms-full.txt contains full tabular database for all 70 locations. Strongest asset in the technical stack."
        status: "confirmed"
        priority: "low"

  - domain: "Schema Markup"
    summary: "Schema is present and rich — far better than most sites. Four internal conflicts confirmed from raw HTML that undermine structured data trust signals."
    items:
      - signal: "Duplicate conflicting @id blocks — Organization and WebSite"
        detail: "Homepage contains two Organization nodes and two WebSite nodes with identical @id URIs but different content. Parser attempts to merge conflicting fields — ambiguous fields get dropped. Fix: consolidate to one of each per page."
        status: "confirmed"
        priority: "high"
      - signal: "sameAs self-reference — zero entity authority signal"
        detail: "One Organization block sameAs points to slocoffeeguide.com itself. sameAs exists to connect entities to external knowledge graph nodes (Wikidata, Wikipedia). Self-reference provides no signal. Fix: create Wikidata entry for SLO Coffee Guide; use that as sameAs."
        status: "confirmed"
        priority: "high"
      - signal: "LocalBusiness schema applied to the guide, not a coffee shop"
        detail: "The guide itself is marked as a LocalBusiness at SLO's geo coordinates. The guide is a directory, not a physical business. This misrepresents the entity type to AI knowledge graphs. Fix: remove LocalBusiness from the guide's schema."
        status: "confirmed"
        priority: "medium"
      - signal: "Data inconsistency — 82+ shops vs 70 across all sources"
        detail: "Organization description says 82+. ItemList numberOfItems = 70. FAQ schema = 70. llms-full.txt = 70. Conflicting figures across schema and agent-native files degrade trust signals. Fix: standardise on one accurate number everywhere."
        status: "confirmed"
        priority: "medium"
      - signal: "Schema types present — FAQPage, Speakable, Dataset, CafeOrCoffeeShop, AggregateRating"
        detail: "FAQPage (12 Q&As), Speakable, Dataset pointing to llms-full.txt, and CafeOrCoffeeShop with AggregateRating on top 10 listings all confirmed in raw HTML. Structurally sound where not conflicting."
        status: "confirmed"
        priority: "low"

  - domain: "Platform Citation"
    summary: "Perplexity is the active citation channel. ChatGPT and Copilot are blocked. Google AI Overviews unverified. Schema fixes are most impactful on Google."
    items:
      - signal: "Perplexity — cited at position 4 for 'best coffee shops in San Luis Obispo'"
        detail: "slocoffeeguide.com confirmed in Perplexity results, below visitSLO, wandering.com, and coffeezone.com. Technical access is clear. Position gap is authority, not access — off-site signals (Reddit, entity directories) are the lever."
        status: "confirmed"
        priority: "medium"
      - signal: "ChatGPT — blocked (Bing dependency)"
        detail: "No Bing indexation = no ChatGPT citation capability. OAI-SearchBot is permitted but indexes from Bing — Bing must index the site first."
        status: "confirmed"
        priority: "critical"
      - signal: "Microsoft Copilot — blocked (Bing dependency)"
        detail: "Same Bing dependency as ChatGPT. Both platforms unblocked by a single Bing Webmaster Tools submission."
        status: "confirmed"
        priority: "critical"
      - signal: "Google AI Overviews — citation presence unverified"
        detail: "Googlebot and Google-Extended permitted. Core search ranking is the prerequisite for AI Overview inclusion. Schema conflicts (duplicate @id, sameAs) are most costly on Google, the highest schema-sensitive platform."
        status: "unconfirmed"
        priority: "medium"

gaps:
  - "Google AI Overview citation presence — requires direct Google search test on target queries"
  - "Individual shop page factual density — 76 pages in sitemap; chunk quality not assessed"
  - "Reddit presence — 21–40% of Google AI Overview citations come from Reddit; current presence unknown"
  - "Competitor citation landscape — which sites are ranking above slocoffeeguide.com across platforms not fully mapped"
  - "Google organic ranking for target queries — prerequisite for AI Overview inclusion, not verified"

next_move: "Submit slocoffeeguide.com to Bing Webmaster Tools (bing.com/webmasters) — 30-minute fix that unblocks ChatGPT and Copilot citation capability immediately. Then run 'best coffee shops San Luis Obispo' on Google and note whether slocoffeeguide.com appears in AI Overviews."
